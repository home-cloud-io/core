name: services - CI

on:
  pull_request:
    branches:
      - main
    paths:
      - api/**
      - cmd/**
      - pkg/**

env:
  REGISTRY: ${{ vars.REGISTRY || 'ghcr.io' }}
  TARGET_PLATFORMS: linux/amd64

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build-and-test:
    name: Build-Test (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.26.x']
        service: [daemon, locator, mdns, operator, tunnel]
    env:
      GOPRIVATE: github.com/home-cloud-io/core
    steps:
      - uses: actions/checkout@v4

      - name: Git config
        env:
          GH_ACCESS_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}
        run: |
          git config --global url."https://${GH_ACCESS_TOKEN}:x-oauth-basic@github.com/".insteadOf "https://github.com/"

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache-dependency-path: go.sum

      - name: Test
        working-directory: cmd/${{ matrix.service }}
        run: go test ./...

      - name: Build
        working-directory: cmd/${{ matrix.service }}
        run: go build main.go

  docker-image:
    name: Docker Image (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [daemon, locator, mdns, operator, tunnel]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME || (env.REGISTRY == 'ghcr.io' && github.actor) }}
          password: ${{ secrets.DOCKER_PASSWORD || (env.REGISTRY == 'ghcr.io' && secrets.GITHUB_TOKEN) }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.service }}
          tags: |
            type=sha

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: cmd/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: ${{ env.TARGET_PLATFORMS }}
          build-args: |
            GITHUB_TOKEN=${{ secrets.GH_ACCESS_TOKEN }}
