name: services - CD

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - api/**
      - cmd/**
      - pkg/**
    tags:
      - v**

env:
  REGISTRY: ${{ vars.REGISTRY || 'ghcr.io' }}
  # TODO: build arm64 too
  TARGET_PLATFORMS: linux/amd64

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    name: Test (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.26.x"]
        service: [daemon, locator, mdns, operator, tunnel]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache-dependency-path: go.sum

      - name: Test
        working-directory: cmd/${{ matrix.service }}
        run: go test ./...

  docker:
    name: Docker (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [daemon, locator, mdns, operator, tunnel]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME || (env.REGISTRY == 'ghcr.io' && github.actor) }}
          password: ${{ secrets.DOCKER_PASSWORD || (env.REGISTRY == 'ghcr.io' && secrets.GITHUB_TOKEN) }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.service }}
          tags: |
            type=sha
            type=semver,pattern={{raw}}
            type=raw,value=latest

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: cmd/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: ${{ env.TARGET_PLATFORMS }}
          build-args: |
            GITHUB_TOKEN=${{ secrets.GH_ACCESS_TOKEN }}
